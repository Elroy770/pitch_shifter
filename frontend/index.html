<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pitch Shift</title>
    <meta
      name="description"
      content="A minimal Pitch Shift frontend scaffold for uploading media or pasting a YouTube URL."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand__mark">PS</div>
          <div>
            <div class="brand__name">Pitch Shift</div>
          </div>
        </div>
        <div class="topbar__meta">
          <span class="pill" id="apiHealth">API: online</span>
        </div>
      </header>

      <main class="layout">
        <section class="grid" id="ingest">
          <article class="card">
            <div class="card__header">
              <h2>Upload Media</h2>
            </div>
            <form id="uploadForm" class="form">
              <label class="field">
                <span>Choose media file</span>
                <input
                  id="uploadFile"
                  name="file"
                  type="file"
                  accept=".mp3,.mp4,.m4a,.wav,.webm"
                />
              </label>

              <div class="form-grid">
                <label class="field">
                  <span>Semitone shift</span>
                  <select id="uploadShift" name="shift_semitones">
                    <option value="-12">-12</option>
                    <option value="-11">-11</option>
                    <option value="-10">-10</option>
                    <option value="-9">-9</option>
                    <option value="-8">-8</option>
                    <option value="-7">-7</option>
                    <option value="-6">-6</option>
                    <option value="-5">-5</option>
                    <option value="-4">-4</option>
                    <option value="-3">-3</option>
                    <option value="-2">-2</option>
                    <option value="-1">-1</option>
                    <option value="0" selected>0</option>
                    <option value="1">+1</option>
                    <option value="2">+2</option>
                    <option value="3">+3</option>
                    <option value="4">+4</option>
                    <option value="5">+5</option>
                    <option value="6">+6</option>
                    <option value="7">+7</option>
                    <option value="8">+8</option>
                    <option value="9">+9</option>
                    <option value="10">+10</option>
                    <option value="11">+11</option>
                    <option value="12">+12</option>
                  </select>
                </label>
                <label class="field">
                  <span>Output format</span>
                  <select id="uploadFormat" name="output_format"></select>
                </label>
              </div>

              <button type="submit" class="button button--primary">
                Upload & process
              </button>
            </form>
            <p class="helper" id="uploadHint">
              Accepted formats: MP3, WAV, M4A, MP4, WebM.
            </p>
          </article>

          <article class="card">
            <div class="card__header">
              <h2>YouTube URL</h2>
            </div>
            <form id="youtubeForm" class="form">
              <label class="field">
                <span>YouTube link</span>
                <input
                  id="youtubeUrl"
                  name="url"
                  type="url"
                  placeholder="https://www.youtube.com/watch?v=…"
                  autocomplete="off"
                />
              </label>

              <div class="form-grid">
                <label class="field">
                  <span>Semitone shift</span>
                  <select id="youtubeShift" name="shift_semitones">
                    <option value="-12">-12</option>
                    <option value="-11">-11</option>
                    <option value="-10">-10</option>
                    <option value="-9">-9</option>
                    <option value="-8">-8</option>
                    <option value="-7">-7</option>
                    <option value="-6">-6</option>
                    <option value="-5">-5</option>
                    <option value="-4">-4</option>
                    <option value="-3">-3</option>
                    <option value="-2">-2</option>
                    <option value="-1">-1</option>
                    <option value="0" selected>0</option>
                    <option value="1">+1</option>
                    <option value="2">+2</option>
                    <option value="3">+3</option>
                    <option value="4">+4</option>
                    <option value="5">+5</option>
                    <option value="6">+6</option>
                    <option value="7">+7</option>
                    <option value="8">+8</option>
                    <option value="9">+9</option>
                    <option value="10">+10</option>
                    <option value="11">+11</option>
                    <option value="12">+12</option>
                  </select>
                </label>
                <label class="field">
                  <span>Output format</span>
                  <select id="youtubeFormat" name="output_format"></select>
                </label>
              </div>

              <button type="submit" class="button button--primary">
                Fetch & process
              </button>
            </form>
            <p class="helper">
              The URL is validated before the job is created.
            </p>
          </article>
        </section>

        <section class="card results" id="results">
          <div class="card__header">
            <h2>Result</h2>
            <span class="badge" id="jobBadge">Idle</span>
          </div>

          <div class="results__grid">
            <div class="panel">
              <dl class="summary" id="jobSummary">
                <div>
                  <dt>Status</dt>
                  <dd id="jobStatus">—</dd>
                </div>
                <div>
                  <dt>Source</dt>
                  <dd id="jobSource">—</dd>
                </div>
                <div>
                  <dt>Shift</dt>
                  <dd id="jobShift">—</dd>
                </div>
                <div>
                  <dt>Format</dt>
                  <dd id="jobFormat">—</dd>
                </div>
              </dl>
            </div>

            <div class="panel panel--player" id="playerPanel">
              <div class="player-placeholder" id="playerPlaceholder">
                <div class="player-placeholder__icon">▶</div>
                <div>
                  <strong id="playerTitle">Ready to process</strong>
                  <p id="playerText">Upload or paste a URL to begin</p>
                </div>
              </div>
              <div class="player-stage" id="playerStage">
                <audio id="audioPlayer" controls preload="none" hidden></audio>
                <video
                  id="videoPlayer"
                  controls
                  preload="none"
                  hidden
                  playsinline
                ></video>
              </div>
            </div>
          </div>

          <div class="output-box">
            <div class="output-box__header">
              <span class="pill" id="downloadPill">Download unavailable</span>
            </div>
            <p class="muted" id="outputText" style="display: none"></p>
            <a
              class="button button--ghost button--disabled"
              id="downloadLink"
              href="#"
              aria-disabled="true"
              >Download</a
            >
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
